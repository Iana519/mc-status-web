<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마인크래프트 서버 상태</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1e1f22; /* 디스코드와 비슷한 다크 테마 배경 */
            color: #dbdee1;
        }
        .container {
            text-align: center;
            padding: 50px;
            border-radius: 16px;
            background-color: #2b2d31;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            min-width: 300px;
        }
        h1 {
            margin-top: 0;
            color: #f2f3f5;
            font-size: 1.8rem;
        }
        #status-box {
            font-size: 2rem;
            font-weight: 700;
            padding: 20px;
            border-radius: 12px;
            margin: 30px 0;
            transition: all 0.3s ease;
        }
        .online {
            color: #23a559; /* 초록색 */
            background-color: rgba(35, 165, 89, 0.1);
            border: 2px solid #23a559;
        }
        .offline {
            color: #da373c; /* 빨간색 */
            background-color: rgba(218, 55, 60, 0.1);
            border: 2px solid #da373c;
        }
        .loading {
            color: #f0b232; /* 노란색 */
            background-color: rgba(240, 178, 50, 0.1);
            border: 2px solid #f0b232;
        }
        #player-count {
            font-size: 1.1rem;
            color: #b5bac1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>마크 서버 체크기</h1>
        <div id="status-box" class="loading">상태 확인 중...</div>
        <p id="player-count">서버에 연결하고 있습니다.</p>
    </div>

    <script>
        async function checkStatus() {
            const statusBox = document.getElementById('status-box');
            const playerCount = document.getElementById('player-count');

            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                if (data.online) {
                    statusBox.textContent = "서버가 열렸습니다";
                    statusBox.className = "online";
                    playerCount.textContent = `현재 접속자: ${data.players}명 / ${data.maxPlayers}명`;
                } else {
                    statusBox.textContent = "서버가 닫혀있습니다";
                    statusBox.className = "offline";
                    playerCount.textContent = "서버가 오프라인 상태입니다.";
                }
            } catch (error) {
                statusBox.textContent = "오류 발생";
                statusBox.className = "offline";
                playerCount.textContent = "서버 상태를 불러올 수 없습니다.";
            }
        }

        // 페이지 열자마자 바로 확인
        checkStatus();
        // 그 후 10초마다 계속 새로고침 없이 자동 확인
        setInterval(checkStatus, 10000);
    </script>
</body>
</html>
